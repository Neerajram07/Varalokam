# ═══════════════════════════════════════════════════════════
#  Varalokam — Nginx Configuration
#  Reverse proxy with WebSocket support for Socket.IO
# ═══════════════════════════════════════════════════════════

# Rate limiting zone (prevents abuse)
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

# Upstream — the Python app
upstream varalokam_backend {
    server 127.0.0.1:8080;
    keepalive 64;
}

server {
    listen 80;
    server_name _;  # Replace with your domain: server_name yourdomain.com;

    # ── Security Headers ─────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Socket.IO / WebSocket ────────────────────────────
    location /socket.io/ {
        proxy_pass http://varalokam_backend;

        # WebSocket upgrade headers
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Preserve client info
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for long-lived WebSocket connections
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        # Disable buffering for real-time
        proxy_buffering off;
    }

    # ── API endpoints ────────────────────────────────────
    location /health {
        proxy_pass http://varalokam_backend;
        proxy_set_header Host $host;
        limit_req zone=api burst=5 nodelay;
    }

    location /stats {
        proxy_pass http://varalokam_backend;
        proxy_set_header Host $host;
        limit_req zone=api burst=5 nodelay;
    }

    # ── Frontend Static Files ────────────────────────────
    # Option 1: Serve from the same server
    location / {
        root /opt/varalokam/frontend;
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # Option 2: If frontend is on S3/CloudFront, redirect root:
    # location / {
    #     return 301 https://your-cloudfront-domain.com$request_uri;
    # }

    # ── Gzip Compression ────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # ── Access & Error Logs ──────────────────────────────
    access_log /var/log/nginx/varalokam-access.log;
    error_log /var/log/nginx/varalokam-error.log;
}
